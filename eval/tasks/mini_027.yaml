task_id: mini_027
repo: repos/mini_027
issue: |
  The warehouse fulfillment pipeline is producing fill rates well above
  1.0, which is impossible — fill rate should be total units filled
  divided by total units ordered, always a proportion between 0.0 and 1.0.

  The aggregated totals (total filled, total ordered) appear reasonable
  when inspected individually. The error is isolated to the final step that
  converts those two totals into a proportional rate — the formula appears
  to have the numerator and denominator swapped.
test_cmd: pytest test_regression.py -v
time_limit_s: 360
max_iterations: 5
difficulty: hard
tags:
