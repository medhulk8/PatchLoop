task_id: mini_024
repo: repos/mini_024
issue: |
  The chargeback analytics pipeline is producing chargeback rates well above
  1.0, which is impossible — chargeback rate should be total disputed value
  divided by total processed value, always a proportion between 0.0 and 1.0.

  The aggregated totals (total disputed, total processed) appear reasonable
  when inspected individually. The error is isolated to the final step that
  converts those two totals into a proportional rate — the formula appears
  to have the numerator and denominator swapped.
test_cmd: pytest test_regression.py -v
time_limit_s: 360
max_iterations: 5
difficulty: hard
